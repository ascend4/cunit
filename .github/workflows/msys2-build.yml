name: CUnit MSYS2 Build

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  package:
    name: Build MSYS2 package (UCRT64)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Configure Git line endings
        shell: bash
        run: git config --global core.autocrlf input

      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true
          cache: true
          install: >-
            base-devel
            git

      - name: Create source tarball for PKGBUILD
        run: |
          git archive \
            --format=tar.gz \
            --prefix=CUnit-2.1-3/ \
            -o packaging/msys2/CUnit-2.1-3.tar.gz \
            HEAD

      - name: Build package
        working-directory: packaging/msys2
        run: MINGW_ARCH=ucrt64 makepkg-mingw -sCLf --noconfirm

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: cunit-msys2-ucrt64-pkg
          path: packaging/msys2/*.pkg.tar.zst
          if-no-files-found: error

  test-package:
    name: Test installed MSYS2 package (UCRT64)
    runs-on: windows-latest
    needs: package

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          cache: true
          install: >-
            mingw-w64-ucrt-x86_64-cc
            mingw-w64-ucrt-x86_64-pkgconf

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: cunit-msys2-ucrt64-pkg
          path: pkg

      - name: Install package artifact
        run: |
          pacman -U --noconfirm pkg/*.pkg.tar.zst
          test -f "${MINGW_PREFIX}/include/CUnit/CUnit.h"
          test -f "${MINGW_PREFIX}/lib/libcunit.a" || test -f "${MINGW_PREFIX}/lib/libcunit.dll.a"

      - name: Smoke test installed package
        run: |
          cat > smoke.c <<'EOF'
          #include <CUnit/CUnit.h>

          int main(void) {
            if (CU_initialize_registry() != CUE_SUCCESS) {
              return 1;
            }
            CU_cleanup_registry();
            return 0;
          }
          EOF

          gcc smoke.c -o smoke $(pkgconf --cflags --libs cunit)
          ./smoke
