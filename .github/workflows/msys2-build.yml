name: CUnit MSYS2 Build

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build on MSYS2 UCRT64
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Configure Git line endings
        shell: bash
        run: git config --global core.autocrlf input

      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          cache: true
          install: >-
            base-devel
            git
            mingw-w64-ucrt-x86_64-autotools
            mingw-w64-ucrt-x86_64-cc
            mingw-w64-ucrt-x86_64-pkgconf

      - name: Bootstrap and configure
        run: ./bootstrap --configure --prefix "$(pwd)/_install" -- --enable-debug --enable-test

      - name: Build
        run: make -j"$(nproc)"

      - name: Run internal self-tests
        run: make check

      - name: Install
        run: make install

      - name: Smoke test installed package metadata
        run: |
          cat > smoke.c <<'EOF'
          #include <CUnit/CUnit.h>

          int main(void) {
            if (CU_initialize_registry() != CUE_SUCCESS) {
              return 1;
            }
            CU_cleanup_registry();
            return 0;
          }
          EOF

          export PATH="$(pwd)/_install/bin:${PATH}"
          export PKG_CONFIG_PATH="$(pwd)/_install/lib/pkgconfig"
          gcc smoke.c -o smoke $(pkgconf --cflags --libs cunit)
          ./smoke
