name: CUnit Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional tag name to validate, for example v2.1.3. Defaults to VERSION.'
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  verify-version:
    name: Verify tag and VERSION
    runs-on: ubuntu-latest
    outputs:
      version_file: ${{ steps.verify.outputs.version_file }}
      pkg_version: ${{ steps.verify.outputs.pkg_version }}
      release_tag: ${{ steps.verify.outputs.release_tag }}
      dist_dir: ${{ steps.verify.outputs.dist_dir }}
      dist_file: ${{ steps.verify.outputs.dist_file }}

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Verify tag matches VERSION
        id: verify
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          version_file="$(tr -d '[:space:]' < VERSION)"
          pkg_version="${version_file//-/.}"
          expected_tag="v${pkg_version}"
          release_tag="${GITHUB_REF_NAME}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            release_tag="${INPUT_RELEASE_TAG}"
            if [ -z "${release_tag}" ]; then
              release_tag="${expected_tag}"
            fi
          fi

          if [ "${release_tag}" != "${expected_tag}" ]; then
            echo "Tag/version mismatch" >&2
            echo "  VERSION file: ${version_file}" >&2
            echo "  Expected tag: ${expected_tag}" >&2
            echo "  Actual tag:   ${release_tag}" >&2
            exit 1
          fi

          if ! grep -Fq '_distver="$(tr -d' packaging/msys2/PKGBUILD || \
             ! grep -Fq '< ../../VERSION)' packaging/msys2/PKGBUILD; then
            echo "PKGBUILD _distver is not read from VERSION" >&2
            exit 1
          fi

          if ! grep -Fq 'pkgver=${_distver//-/.}' packaging/msys2/PKGBUILD; then
            echo "PKGBUILD pkgver is not derived from _distver" >&2
            exit 1
          fi

          if ! grep -Fq 'm4_esyscmd_s([cat VERSION])' configure.ac; then
            echo "configure.ac does not read VERSION for AC_INIT" >&2
            exit 1
          fi

          echo "version_file=${version_file}" >> "${GITHUB_OUTPUT}"
          echo "pkg_version=${pkg_version}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "dist_dir=cunit-${version_file}" >> "${GITHUB_OUTPUT}"
          echo "dist_file=cunit-${version_file}" >> "${GITHUB_OUTPUT}"

  source-dist:
    name: Build source dist
    runs-on: ubuntu-latest
    needs: verify-version

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            libtool

      - name: Bootstrap
        run: ./bootstrap --configure --prefix "${RUNNER_TEMP}/cunit-distcheck" -- --enable-debug --enable-examples --enable-test

      - name: Build and check source dist
        run: make distcheck DISTCHECK_CONFIGURE_FLAGS="--enable-debug --enable-examples --enable-test"

      - name: Verify source dist contents
        env:
          DIST_FILE: ${{ needs.verify-version.outputs.dist_file }}
        run: |
          test -f "${DIST_FILE}.tar.gz"
          tar -tzf "${DIST_FILE}.tar.gz" | grep -Fx "${DIST_FILE}/configure"
          tar -tzf "${DIST_FILE}.tar.gz" | grep -Fx "${DIST_FILE}/Makefile.in"
          tar -tzf "${DIST_FILE}.tar.gz" | grep -Fx "${DIST_FILE}/VERSION"
          tar -tzf "${DIST_FILE}.tar.gz" | grep -Fx "${DIST_FILE}/README.md"
          tar -tzf "${DIST_FILE}.tar.gz" | grep -Fx "${DIST_FILE}/Examples/ExampleTests.h"

      - name: Upload source dist
        uses: actions/upload-artifact@v6
        with:
          name: cunit-source-dist
          path: ${{ needs.verify-version.outputs.dist_file }}.tar.gz
          if-no-files-found: error

  package:
    name: Build release assets (UCRT64)
    runs-on: windows-latest
    needs:
      - verify-version
      - source-dist

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Configure Git line endings
        shell: bash
        run: git config --global core.autocrlf input

      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: true
          cache: true
          install: >-
            base-devel
            git

      - name: Download source dist for PKGBUILD
        uses: actions/download-artifact@v7
        with:
          name: cunit-source-dist
          path: packaging/msys2

      - name: Build package
        working-directory: packaging/msys2
        run: MINGW_ARCH=ucrt64 makepkg-mingw -sCLf --noconfirm

      - name: Upload release assets
        uses: actions/upload-artifact@v6
        with:
          name: cunit-release-assets
          path: |
            packaging/msys2/*.pkg.tar.zst
            packaging/msys2/*.tar.gz
          if-no-files-found: error

  test-source-dist-rocky8:
    name: Test source dist (Rocky 8)
    runs-on: ubuntu-latest
    container: rockylinux:8
    needs:
      - verify-version
      - source-dist

    steps:
      - name: Install build dependencies
        run: dnf -y install gcc make diffutils findutils tar gzip

      - name: Download source dist
        uses: actions/download-artifact@v7
        with:
          name: cunit-source-dist
          path: .

      - name: Build and test source dist
        env:
          DIST_FILE: ${{ needs.verify-version.outputs.dist_file }}
        run: |
          tar -xzf "${DIST_FILE}.tar.gz"
          mkdir build
          cd build
          "../${DIST_FILE}/configure" \
            --prefix=/tmp/cunit-rocky8 \
            --enable-debug \
            --enable-examples \
            --enable-test
          make -j"$(nproc)"
          make check

  test-package:
    name: Test installed release package (UCRT64)
    runs-on: windows-latest
    needs: package

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          cache: true
          install: >-
            mingw-w64-ucrt-x86_64-cc
            mingw-w64-ucrt-x86_64-pkgconf

      - name: Download release assets
        uses: actions/download-artifact@v7
        with:
          name: cunit-release-assets
          path: release-assets

      - name: Install package artifact
        run: |
          pacman -U --noconfirm release-assets/*.pkg.tar.zst
          test -f "${MINGW_PREFIX}/include/CUnit/CUnit.h"
          test -f "${MINGW_PREFIX}/lib/libcunit.a" || test -f "${MINGW_PREFIX}/lib/libcunit.dll.a"

      - name: Smoke test installed package
        run: |
          cat > smoke.c <<'EOF'
          #include <CUnit/CUnit.h>

          int main(void) {
            if (CU_initialize_registry() != CUE_SUCCESS) {
              return 1;
            }
            CU_cleanup_registry();
            return 0;
          }
          EOF

          gcc smoke.c -o smoke $(pkgconf --cflags --libs cunit)
          ./smoke

  publish-release:
    name: Publish GitHub release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - verify-version
      - source-dist
      - test-source-dist-rocky8
      - test-package

    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v7
        with:
          name: cunit-release-assets
          path: release-assets

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PKG_VERSION: ${{ needs.verify-version.outputs.pkg_version }}
          RELEASE_TAG: ${{ needs.verify-version.outputs.release_tag }}
        run: |
          gh release create "${RELEASE_TAG}" \
            --repo "${GH_REPO}" \
            --verify-tag \
            --generate-notes \
            --title "CUnit ${PKG_VERSION}" \
            release-assets/*
